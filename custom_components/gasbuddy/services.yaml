lookup_gps:
  name: Lookup GPS
  description: List gas prices based on GPS coordinates of device tracker.
  target:
    entity:
      domain:
        - device_tracker
        - person

lookup_zip:
  name: Lookup Zip
  description: List gas prices based on entered ZIP code.
  fields:
    zipcode:
      selector:
        text:
      required: true

ev_lookup_gps:
  name: EV Lookup GPS
  description: List EV stations nearby based on GPS coordinates of device tracker or person.
  target:
    entity:
      domain:
        - device_tracker
        - person
  fields:
    radius:
      name: Search Radius
      description: Search radius in miles.
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: mi
      required: false
    limit:
      name: Station Limit
      description: Limit of stations to return.
      selector:
        number:
          min: 1
          max: 99
          step: 1
      required: false

ev_lookup_zip:
  name: EV Lookup Zip
  description: List EV stations nearby based on entered ZIP code.
  fields:
    zipcode:
      name: Zip Code
      description: Zip code/postal code to search nearby.
      selector:
        text:
      required: true
    radius:
      name: Search Radius
      description: Search radius in miles.
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: mi
      required: false
    limit:
      name: Station Limit
      description: Limit of stations to return.
      selector:
        number:
          min: 1
          max: 99
          step: 1
      required: false

clear_cache:
  name: Clear Cache
  description: Clear library cache file.
  target:
    entity:
      integration: gasbuddy
