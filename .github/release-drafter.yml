name-template: "$RESOLVED_VERSION"
tag-template: "$RESOLVED_VERSION"
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
sort-direction: ascending
autolabeler:
  - label: "chore"
    branch:
      - "/^chore-.*/i"
    title:
      - "/^chore(\\s*\\(.*\\))?:/i"
  - label: "bugfix"
    branch:
      - "/^fix-.*/i"
    title:
      - "/^fix(\\s*\\(.*\\))?:/i"
  - label: "feature"
    branch:
      - "/^feat-.*/i"
    title:
      - "/^feat(\\s*\\(.*\\))?:/i"
  - label: "enhancement"
    branch:
      - "/^refactor-.*/i"
    title:
      - "/^refactor(\\s*\\(.*\\))?:/i"
  - label: "code-quality"
    branch:
      - "/^test-.*/i"
    title:
      - "/^test(s)?(\\s*\\(.*\\))?:/i"
  - label: "dependencies"
    branch:
      - "/^deps-.*/i"
    title:
      - "/^build\\(deps\\):/i"
categories:
  - title: "💥 Breaking Change 💥"
    labels:
      - "breaking-change"
  - title: "⚡ Enhancements ⚡"
    labels:
      - "enhancement"
  - title: "✨ New Features ✨"
    labels:
      - "feature"
  - title: "🐛 Bug Fixes 🐛"
    labels:
      - "fix"
      - "bugfix"
      - "bug"
  - title: "🔧 Maintenance 🔧"
    labels:
      - "chore"
    collapse-after: 3
  - title: "🎓 Code Quality 🎓"
    labels:
      - "code-quality"
  - title: "🔩 Dependency 🔩"
    labels:
      - "dependencies"
    collapse-after: 3

template: |
  [![Downloads for this release](https://img.shields.io/github/downloads/firstof9/ha-gasbuddy/$RESOLVED_VERSION/total.svg)](https://github.com/firstof9/ha-gasbuddy/releases/$RESOLVED_VERSION)

  $CHANGES

  ## Links
  - [Submit bugs/feature requests](https://github.com/firstof9/ha-gasbuddy/issues)
