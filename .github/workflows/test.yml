name: Pull actions

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  UV_PRERELEASE: allow

jobs:
  pre-commit:
    runs-on: "ubuntu-latest"
    name: Pre-commit
    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # @v6

      - name: 🛠️ Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # @v6
        with:
          python-version: "3.14.2"

      - name: 🔍 Run pre-commit hooks
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # @v3.0.1

      - name: 🔍 Hassfest validation
        uses: "home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c"

      - name: 🔍 HACS validation
        uses: "hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa"
        with:
          category: integration

  tests:
    runs-on: "ubuntu-latest"
    name: Run tests
    needs: pre-commit
    strategy:
      matrix:
        python-version:
          - "3.14.2"

    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # @v6

      - name: 🛠️ Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # @v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "requirements*.txt"

      - name: 🛠️ Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: 📦 Install tox
        # We install tox as a tool with the necessary plugins
        run: uv tool install tox --with tox-uv --with tox-gh-actions --prerelease=allow

      - name: 🏃 Test with tox
        run: tox

      - name: 📤 Upload coverage to Codecov
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # @v7
        with:
          name: coverage-data-${{ matrix.python-version }}
          path: "coverage.xml"

  coverage:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # @v6
        with:
          fetch-depth: 2
      - name: 📥 Download coverage data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # @v8
        with:
          pattern: coverage-data-*
          merge-multiple: true
      - name: 📤 Upload coverage report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # @v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
