name: Pull actions

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pre-commit:
    runs-on: "ubuntu-latest"
    name: Pre-commit
    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@v4

      - name: 🛠️ Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 🔍 Run pre-commit hooks
        uses: pre-commit/action@v3.0.1

      - name: 🔍 Hassfest validation
        uses: "home-assistant/actions/hassfest@f6f29a7ee3fa0eccadf3620a7b9ee00ab54ec03b"

      - name: 🔍 HACS validation
        uses: "hacs/action@dcb30e72781db3f207d5236b861172774ab0b485"
        with:
          category: integration

  tests:
    runs-on: "ubuntu-latest"
    name: Run tests
    needs: pre-commit
    strategy:
      matrix:
        python-version:
          - "3.13"
          - "3.14"

    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@v4

      - name: 🛠️ Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "requirements*.txt"

      - name: 🛠️ Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: 📦 Install tox
        # We install tox as a tool with the necessary plugins
        run: uv tool install tox --with tox-uv --with tox-gh-actions --prerelease=allow

      - name: 🏃 Test with tox
        run: tox

      - name: 📤 Upload coverage to Codecov
        uses: "actions/upload-artifact@v4"
        with:
          name: coverage-data-${{ matrix.python-version }}
          path: "coverage.xml"

  coverage:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: 📥 Download coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-data-*
          merge-multiple: true
      - name: 📤 Upload coverage report
        uses: codecov/codecov-action@v4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
