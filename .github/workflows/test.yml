name: Pull actions

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  UV_PRERELEASE: allow

jobs:
  pre-commit:
    runs-on: "ubuntu-latest"
    name: Pre-commit
    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6

      - name: 🛠️ Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # @v6
        with:
          python-version: "3.14.2"

      - name: 🔍 Run pre-commit hooks
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # @v3.0.1

      - name: 🔍 Hassfest validation
        uses: "home-assistant/actions/hassfest@f6f29a7ee3fa0eccadf3620a7b9ee00ab54ec03b"

      - name: 🔍 HACS validation
        uses: "hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa"
        with:
          category: integration

  tests:
    runs-on: "ubuntu-latest"
    name: Run tests
    needs: pre-commit
    strategy:
      matrix:
        python-version:
          - "3.14.2"

    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6

      - name: 🛠️ Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # @v7
        with:
          enable-cache: true
          cache-dependency-glob: "requirements*.txt"

      - name: 🛠️ Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: 📦 Install tox
        # We install tox as a tool with the necessary plugins
        run: uv tool install tox --with tox-uv --with tox-gh-actions --prerelease=allow

      - name: 🏃 Test with tox
        run: tox

      - name: 📤 Upload coverage to Codecov
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # @v7
        with:
          name: coverage-data-${{ matrix.python-version }}
          path: "coverage.xml"

  coverage:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # @v6
        with:
          fetch-depth: 2
      - name: 📥 Download coverage data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # @v8
        with:
          pattern: coverage-data-*
          merge-multiple: true
      - name: 📤 Upload coverage report
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # @v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
